<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>

    <link rel="stylesheet" href="../../dist/css/main.css">
    <script type="module" src="../../dist/game.js"></script>
</head>
<body id="gameBody">
    <header>
        <div class="container container_gap ">
            <div class="container">
                <img id="scorePlayerIconB" src="../assets/img/game_page/code-theme/header/player_label_blue.png" alt="blue player label">
                <p class="txt txt_b">Blue</p> <p id="scoreDisplayB"></p>
            </div>
            <div class="container">
                <img id="scorePlayerIconO" src="../assets/img/game_page/code-theme/header/player_label_orange.png" alt="orange player label">
                <p class="txt txt_o">Orange</p> <p id="scoreDisplayO"></p>
            </div>
        </div>

        <div id="currentPlayerDisplay" class="container">
            Current player: 
            <img src="" alt="player icon">
        </div>

        <button id="exitBtn" class="btn btn_transparent">
            <img id="exitBtnImage" class="btn_exit" src="../assets/img/game_page/code-theme/header/exit_game_default.png" alt="Exit game icon">
        </button>
    </header>

    <dialog id="exitDialog">
    <form method="dialog">
        <h3>End Match?</h3>
        <p>sure you want to end the match?</p>
        <div class="dialog-buttons">
        <button value="cancel" id="cancelExitBtn">cancel</button>
        <button value="confirm" id="confirmExitBtn">yes, end game</button>
        </div>
    </form>
    </dialog>

    <main id="playGround">
        
    </main>

</body>
</html>
