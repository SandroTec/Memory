<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@700&family=Orbitron:wght@700&family=Red+Rose:wght@700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/img/settings_page/Theme Visual_Code.png" type="image/x-icon">

    <link rel="stylesheet" href="../../dist/css/main.css">
    <script type="module" src="../../dist/game.js"></script>
</head>
<body id="gameBody">
    <header>
        <div class="container container_gap ">
            <div class="container">
                <img id="scorePlayerIconB" src="../assets/img/game_page/code-theme/header/player_label_blue.png" alt="blue player label">
                <p class="txt txt_b blue">Blue</p> <p class="blue" id="scoreDisplayB"></p>
            </div>
            <div class="container">
                <img id="scorePlayerIconO" src="../assets/img/game_page/code-theme/header/player_label_orange.png" alt="orange player label">
                <p class="txt txt_o orange">Orange</p> <p class="orange" id="scoreDisplayO"></p>
            </div>
        </div>

        <div id="currentPlayerDisplay" class="container gap-10">
            Current player: 
            <img src="" alt="player icon">
        </div>

        <button id="exitBtn" class="btn btn_exit">
            <img src="../assets/img/game_page/exit-icon.png" alt="exit icon">
            Exit game
        </button>
    </header>

    <dialog id="exitDialog">
        <form method="dialog">

            <h3>End Match?</h3>
            <p>sure you want to end the match?</p>

            <div class="dialog-buttons">
                <button class="btn" id="cancelExitBtn" value="cancel">Back to game</button>
                <button class="btn" id="confirmExitBtn" value="confirm">Exit game</button>
            </div>
        </form>
    </dialog>

    <main id="playGround">
        
    </main>

</body>
</html>
