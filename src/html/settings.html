<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game settings</title>
    <link rel="stylesheet" href="../../dist/css/main.css">
</head>
<body>
    
    <div class="content-container">
        <div class="choosing-container">
            <div class="headline-container">
                <h2>Settings</h2>
                <img src="../assets/img/settings_page/Line 3.png" alt="yellow_headline_underline">
            </div>
            <div class="_themes-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/palette.png" alt="color-palette">
                    <h3>Game themes</h3>
                </div>
                <ul>
                    <li>Code vibes theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indecator/ yellow arrow" class=" choose-indecator"></li>
                    <li>Gaming theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indecator/ yellow arrow" class="d-none choose-indecator"></li>
                    <li>DA Projects theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indecator/ yellow arrow" class="d-none choose-indecator"></li>
                </ul>
            </div>
            <div class="_player-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/chess_pawn.png" alt="chess pawn">
                    <h3>Choose player</h3>
                </div>
                <ul>
                    <li>Blue <img src="../assets/img/settings_page/choosing_line.png" alt="choose indecator/ yellow arrow" class="d-none choose-indecator"></li>
                    <li>Orange <img src="../assets/img/settings_page/choosing_line.png" alt="choose indecator/ yellow arrow" class="d-none choose-indecator"></li>
                </ul>
            </div>
            <div class="_board-size-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/style.png" alt="">
                    <h3>Board size</h3>
                </div>
                <ul>
                    <li>16 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indecator/ yellow arrow" class="d-none choose-indecator"></li>
                    <li>24 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indecator/ yellow arrow" class="d-none choose-indecator"></li>
                    <li>36 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indecator/ yellow arrow" class="d-none choose-indecator"></li>
                </ul>
            </div>
        </div>

        <div class="visability-container">
            <img src="../assets/img/settings_page/Theme Visual.png" alt="">

            <div>

            </div>
        </div>
    </div>
</body>
</html>
