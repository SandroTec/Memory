<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game settings</title>
</head>
<body>
    <h2>Settings</h2>
    <img src="../assets/img/settings_page/Line 3.png" alt="yellow_headline_underline">
    <div class="content-container">
        <div class="choosing-container">
            <div class="_themes-c">
                <div>
                    <img src="" alt="">
                    <h3>Game themes</h3>
                </div>
                <ul>
                    <li>Code vibes theme</li>
                    <li>Gaming theme</li>
                    <li>DA Projects theme</li>
                </ul>
            </div>
            <div class="_player-c">
                <div>
                    <img src="" alt="">
                    <h3>Choose player</h3>
                </div>
                <ul>
                    <li>Blue</li>
                    <li>Orange</li>
                </ul>
            </div>
            <div class="_board-size-c">
                <div>
                    <img src="" alt="">
                    <h3>Board size</h3>
                </div>
                <ul>
                    <li>16 cards</li>
                    <li>24 cards</li>
                    <li>36 cards</li>

            </div>
        </div>

        <div class="visability-container">
            <img src="../assets/img/settings_page/Theme Visual.png" alt="">

            <div>

            </div>
