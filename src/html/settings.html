<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game settings</title>
    <link rel="stylesheet" href="../../dist/css/main.css">
    <script defer src="../../dist/script.js"></script>
</head>
<body>
    
    <div class="content-container">
        <div class="choosing-container">
            <div class="headline-container">
                <h2>Settings</h2>
                <img src="../assets/img/settings_page/Line 3.png" alt="yellow_headline_underline">
            </div>
            <div class="_themes-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/palette.png" alt="color-palette">
                    <h3>Game themes</h3>
                </div>
                <ul>
                    <li data-theme="code">Code vibes theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="choose-indicator"></li>
                    <li data-theme="gaming">Gaming theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                    <li data-theme="da">DA Projects theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                </ul>
            </div>
            <div class="_player-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/chess_pawn.png" alt="chess pawn">
                    <h3>Choose player</h3>
                </div>
                <ul>
                    <li data-player="blue">Blue <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="choose-indicator"></li>
                    <li data-player="orange">Orange <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                </ul>
            </div>
            <div class="_board-size-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/style.png" alt="">
                    <h3>Board size</h3>
                </div>
                <ul>
                    <li data-cards="16">16 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="choose-indicator"></li>
                    <li data-cards="24">24 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                    <li data-cards="36">36 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                </ul>
            </div>
        </div>

        <div class="visability-container">
            <img id="themeImage" src="../assets/img/settings_page/Theme Visual_Code.png" alt="theme preview">

            <div class="game-info-container">
                <p><strong>Theme:</strong></p> <p id="themeDisplay">code</p>
                <img src="../assets/img/settings_page/Line 4.png" alt="">
                <p><strong>Player:</strong></p> <p  id="playerDisplay">blue</p>
                <img src="../assets/img/settings_page/Line 4.png" alt="">
                <p><strong>Board size:</strong></p> <p id="boardDisplay">16 cards</p>
                
                <button onclick="startGame()" class="btn btn_start">
                    <img src="../assets/img/settings_page/smart_display.png" alt="play icon">
                    start
                </button>
            </div>
        </div>
    </div>
</body>
</html>
