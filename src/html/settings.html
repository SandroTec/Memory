<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>game settings</title>

    <link rel="stylesheet" href="../../dist/css/main.css">
    <script type="module" src="../../dist/script.js"></script>
</head>
<body>
    
    <main class="container container_content container_resp-950px">
        <div class="choosing-container">
            <div class="headline-container">
                <h2>Settings</h2>
                <img src="../assets/img/settings_page/Line 3.png" alt="yellow_headline_underline">
            </div>
            <div class="_themes-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/palette.png" alt="color-palette">
                    <h3>Game themes</h3>
                </div>
                <ul>
                    <li data-theme="code"><img class="circle-indicator" src="../../src/assets/img/settings_page/indicator_circle.png" alt="">Code vibes theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="choose-indicator"></li>
                    <li data-theme="gaming"><img class="circle-indicator" src="../../src/assets/img/settings_page/indicator_for_list.png" alt="">Gaming theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                    <li data-theme="da"><img class="circle-indicator" src="../../src/assets/img/settings_page/indicator_for_list.png" alt="">DA Projects theme <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                </ul>
            </div>
            <div class="_player-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/chess_pawn.png" alt="chess pawn">
                    <h3>Choose player</h3>
                </div>
                <ul>
                    <li data-player="blue"><img class="circle-indicator" src="../../src/assets/img/settings_page/indicator_circle.png" alt="">Blue <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="choose-indicator"></li>
                    <li data-player="orange"><img class="circle-indicator" src="../../src/assets/img/settings_page/indicator_for_list.png" alt="">Orange <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                </ul>
            </div>
            <div class="_board-size-c">
                <div class="choosing-headline">
                    <img src="../assets/img/settings_page/style.png" alt="">
                    <h3>Board size</h3>
                </div>
                <ul>
                    <li data-cards="16"><img class="circle-indicator" src="../../src/assets/img/settings_page/indicator_circle.png" alt="">16 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="choose-indicator"></li>
                    <li data-cards="24"><img class="circle-indicator" src="../../src/assets/img/settings_page/indicator_for_list.png" alt="">24 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                    <li data-cards="36"><img class="circle-indicator" src="../../src/assets/img/settings_page/indicator_for_list.png" alt="">36 cards <img src="../assets/img/settings_page/choosing_line.png" alt="choose indicator/ yellow arrow" class="d-none choose-indicator"></li>
                </ul>
            </div>
        </div>

        <div class="visability-container">
            <img id="themeImage" src="../assets/img/settings_page/Theme Visual_Code.png" alt="theme preview">

            <div id="gameSettingsDisplay" class="container container_padding-bg-c container_game-settings">
                <p><strong>Theme:</strong></p> <p id="themeDisplay">CODE</p>
                <img src="../assets/img/settings_page/Line 4.png" alt="">
                <p><strong>Player:</strong></p> <p  id="playerDisplay">BLUE</p>
                <img src="../assets/img/settings_page/Line 4.png" alt="">
                <p><strong>Board size:</strong></p> <p id="boardDisplay">16 CARDS</p>
                
                <button id="startGame" class="btn btn_game-start">
                    <img src="../assets/img/settings_page/smart_display.png" alt="play icon">
                    start
                </button>
            </div>
        </div>
    </main>
</body>
</html>
