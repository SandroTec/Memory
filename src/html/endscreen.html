<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory endscreen</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@700&family=Orbitron:wght@700&family=Red+Rose:wght@700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="../../dist/css/main.css">
    <script type="module" src="../../dist/game-results.js"></script>
</head>
<body id="gameBody">

    <header>
        <img id="codeKonfettiImage" class="endscreen-show-result d-none" src="../../src/assets/img/game_page/code-theme/endscreen/Confetti.png" alt="">
    </header>

    <main class="container container_content">
        <div id="scoreContainer" class="container container_center">
            <img class="d-none" id="headlineImage" src="../assets/img/game_page/code-theme/endscreen/game over.png" alt="Game Over image">
            <h1>GAME OVER</h1>
            <p>Final score</p>
            <div id="scoreDisplayContainer" class="container container_score-board">
                <div class="container">
                    <img id="scoreIconB" src="" alt="Blue player icon">
                    <p id="endScoreDisplayB"></p>
                </div>
                <div class="container">
                    <img id="scoreIconO" src="" alt=" Orange player icon">
                    <p id="endScoreDisplayO"></p>
                </div>
            </div>
            
        </div>

        <div class="container container_center container_game-result endscreen-show-result">
            <h3 id="helpMsg"></h3>
            <h2 id="winnerDisplay"></h2>
            <img class="endscreen-show-result" id="winnerImageDisplay" src="" alt="">

            <button id="homeButton" class="btn btn_transparent">
                <img id="buttonImage" class="image-gray" src="" alt="">
            </button>
        </div>
    </main>
</body>
</html>
